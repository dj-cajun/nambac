<!doctype html>
<html lang="en">

<head>

  <title>nambac.xyz</title>
  <meta name="mobile-web-app-capable" content="yes">

  <style>
    :root {
      --glass: rgba(255, 255, 255, 0.2);

    body {

    .glass-card {
      background: var(--glass);
      backdrop-filter: blur(20px);

      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 30px;
      padding: 40px;
      width: 80%;

    }

      color: #4a148c;

      font-size: 50px;
      margin-bottom: 20px;

    }

</head>

<body>

</html>
