worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;

    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # --- Rate Limiting Zones ---
    # General API: 10 requests/second per IP
    limit_req_zone $binary_remote_addr zone=api_general:10m rate=10r/s;
    # AI Generation: 1 request/minute per IP (expensive operations)
    limit_req_zone $binary_remote_addr zone=api_ai:10m rate=1r/m;
    # Admin endpoints: 5 requests/second per IP
    limit_req_zone $binary_remote_addr zone=api_admin:10m rate=5r/s;

    # Upstream Backend
    upstream backend {
        server 127.0.0.1:8000;
    }

    server {
        listen 80;
        server_name nambac.xyz www.nambac.xyz;

        # Let's Encrypt challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Security Headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # --- Frontend (React SPA) ---
        location / {
            root /var/www/html;
            index index.html;
            try_files $uri $uri/ /index.html;

            # Cache static assets aggressively
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
                expires 30d;
                add_header Cache-Control "public, immutable";
            }
        }

        # --- API Reverse Proxy (General) ---
        location /api/ {
            limit_req zone=api_general burst=20 nodelay;

            proxy_pass http://backend/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Allow large request bodies (for image uploads)
            client_max_body_size 10M;

            # Long timeout for AI generation
            proxy_read_timeout 300s;
            proxy_connect_timeout 10s;
        }

        # --- AI Generation Endpoints (Strict Rate Limit) ---
        location /api/quizzes {
            # POST to /api/quizzes creates quizzes via AI (expensive)
            limit_req zone=api_ai burst=2 nodelay;

            proxy_pass http://backend/api/quizzes;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            client_max_body_size 10M;
            proxy_read_timeout 300s;
        }

        location /api/quiz/generate {
            limit_req zone=api_ai burst=2 nodelay;

            proxy_pass http://backend/api/quiz/generate;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            client_max_body_size 10M;
            proxy_read_timeout 300s;
        }

        location /api/automation/ {
            limit_req zone=api_ai burst=1 nodelay;

            proxy_pass http://backend/api/automation/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 600s;
        }

        # --- Static Images (Direct Serve, bypass backend) ---
        location /images/ {
            alias /app/backend/data/images/;
            expires 7d;
            add_header Cache-Control "public";
        }

        # --- OG Share Endpoint (Server-Side Rendered) ---
        location /share/ {
            proxy_pass http://backend/share/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # HTTPS server block (uncomment after certbot setup)
    # server {
    #     listen 443 ssl http2;
    #     server_name nambac.xyz www.nambac.xyz;
    #
    #     ssl_certificate /etc/letsencrypt/live/nambac.xyz/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/nambac.xyz/privkey.pem;
    #
    #     # ... (copy all location blocks from above)
    # }
}
